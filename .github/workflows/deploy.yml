name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Determine base path
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "GITHUB_PAGES_BASE=/" >> $GITHUB_ENV
          else
            echo "GITHUB_PAGES_BASE=/${{ github.event.repository.name }}/" >> $GITHUB_ENV
          fi

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES_BASE: ${{ env.GITHUB_PAGES_BASE }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4